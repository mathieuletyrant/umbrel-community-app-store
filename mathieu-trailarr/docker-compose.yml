version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mathieu-trailarr_trailarr_1
      APP_PORT: 7889

  trailarr:
    image: nandyalu/trailarr:0.10.1@sha256:91ef9487db7c211362a3dbb145839750e77111a4896cae052b774d3b0107e79f
    environment:
      - TZ=Europe/Paris
      - PUID=1000
      - PGID=1000
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      # Media mounted at the SAME path Sonarr/Radarr report (/downloads), so
      # Trailarr's path mappings are 1:1 and it writes trailers next to the media.
      - ${UMBREL_ROOT}/home/Downloads:/downloads
    restart: on-failure
