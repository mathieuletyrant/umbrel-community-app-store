version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mathieu-trailarr_trailarr_1
      APP_PORT: 7889

  trailarr:
    image: nandyalu/trailarr:0.10.0@sha256:a0e8e077fd0c5ff5344502fd3b8a8bb9214aa26b91bbce1d5b6b86819f042ced
    environment:
      - TZ=Europe/Paris
      - PUID=1000
      - PGID=1000
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      # Media mounted at the SAME path Sonarr/Radarr report (/downloads), so
      # Trailarr's path mappings are 1:1 and it writes trailers next to the media.
      - ${UMBREL_ROOT}/home/Downloads:/downloads
    restart: on-failure
