description: >-
  Profilarr is a configuration management platform for Radarr and Sonarr. It
  takes the pain out of setting up quality — pull curated, community-maintained
  custom formats and quality profiles (TRaSH-guides style), keep them in sync,
  and push them to all your *arr instances from one place.


  Instead of hand-copying dozens of custom formats and scores across Radarr and
  Sonarr, you import a database, tweak what you want, and Profilarr syncs it —
  with Git-style versioning so you can pull updates and see exactly what changed.


  🛠️ SETUP INSTRUCTIONS


  After launching, open Profilarr and connect your Radarr
  (`http://radarr_server_1:7878`) and Sonarr (`http://sonarr_server_1:8989`)
  instances with their API keys (Settings → General → API Key). Then import a
  profile database, choose your profiles/custom formats, and sync them across.
