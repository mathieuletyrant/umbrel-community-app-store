# renovate: datasource=docker depName=haveagitgat/tdarr
version: "2.85.01"
port: 8267
description: >-
  Tdarr is an automated media transcoding and library health-check tool. It
  scans your library on a schedule and applies plugin-driven rules — re-encode
  to H.265/AV1, remux containers, strip unwanted audio/subtitle tracks, flag
  corrupt files — keeping your collection consistent and space-efficient.


  Work is organized as a Server that dishes out tasks and Nodes that process
  them. This app runs the Server with a built-in internal Node, so it transcodes
  out of the box; you can also connect extra Nodes from other machines to the
  Server (port 8266) to spread the load.


  🛠️ SETUP INSTRUCTIONS


  Open Tdarr and add a Library pointing at your media under /downloads (e.g.
  /downloads/movies, /downloads/shows) — the same share your *arr apps use.
  Pick or build a plugin stack (the Tdarr community "flows"/plugins cover most
  needs), and set the transcode cache to /temp. The internal Node is already
  connected; press Transcode/Health Check to start processing.


  ⚡ Hardware transcoding (Intel QSV / VAAPI) works out of the box when your
  server has an Intel iGPU — /dev/dri is passed through automatically. Enable an
  HW-accel plugin/flow (e.g. QSV) in your stack to use it.
developer: HaveAGitGat
