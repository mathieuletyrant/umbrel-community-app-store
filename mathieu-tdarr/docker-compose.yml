version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mathieu-tdarr_server_1
      APP_PORT: 8265

  server:
    image: haveagitgat/tdarr:2.85.01@sha256:eaeb1b39242685915b50f299a89f15e8ec4ef47f54d4b5b5ceee7e9d2a81c412
    environment:
      - TZ=Europe/Paris
      - PUID=1000
      - PGID=1000
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - inContainer=true
      - internalNode=true
      - nodeName=InternalNode
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${APP_DATA_DIR}/data/server:/app/server
      - ${APP_DATA_DIR}/data/configs:/app/configs
      - ${APP_DATA_DIR}/data/logs:/app/logs
      - ${APP_DATA_DIR}/data/transcode:/temp
      - ${UMBREL_ROOT}/home/Downloads:/downloads
    restart: on-failure
