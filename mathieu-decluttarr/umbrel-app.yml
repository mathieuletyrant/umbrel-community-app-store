manifestVersion: 1
id: mathieu-decluttarr
category: media
name: Decluttarr
tagline: Keeps your *arr download queues free of junk (headless)
icon: https://avatars.githubusercontent.com/u/124743318?v=4
version: "2.1.0"
port: 3737
description: >-
  Decluttarr watches the download queues of Radarr, Sonarr, Lidarr, Readarr and
  Whisparr and automatically removes downloads that have become stalled, failed,
  orphaned, or are no longer needed — then triggers a fresh search so you get a
  clean copy instead of a stuck or duplicate one.


  ⚠️ HEADLESS APP — NO WEB UI


  Decluttarr has no interface of its own. Opening the app shows a small status
  page confirming it runs. It is configured entirely through environment
  variables.


  🛠️ SETUP INSTRUCTIONS


  Install Radarr and/or Sonarr from the official Umbrel App Store first —
  Decluttarr auto-detects their API keys (the same way Prowlarr does), so there's
  nothing to paste.


  It ships in dry-run mode, so nothing is deleted until you turn it on. When
  you're ready, set `TEST_RUN` to `False` in the app's compose on your Umbrel host
  at `~/umbrel/app-data/mathieu-decluttarr/docker-compose.yml`, restart the app,
  and follow it with `docker logs -f mathieu-decluttarr_server_1`.


  ⚠️ IMPORTANT: the orphan / stalled / bad-files jobs need a SUPPORTED download
  client (qBittorrent or SABnzbd — NOT Transmission) and are OFF by default.
  With Transmission they would flag your entire library as removable. If you use
  Transmission, use Cleanuparr instead for that kind of cleanup.
developer: ManiMatter
