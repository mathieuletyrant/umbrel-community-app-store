version: "3.7"

# Decluttarr is a HEADLESS worker (no web UI). Following the official Umbrel
# pattern for UI-less services (see flaresolverr), a tiny nginx "status" page is
# used as the app_proxy target so the app has something to open, while the
# decluttarr worker runs alongside it.
#
# The Sonarr/Radarr API keys are auto-detected from their config.xml by
# exports.sh (same approach as the official Prowlarr app), so no manual key
# entry is needed. Install Sonarr/Radarr from the official App Store first.
#
# Decluttarr ships in dry-run mode (TEST_RUN: "True"). To let it actually remove
# downloads, set TEST_RUN to "False" by editing this file on your Umbrel host at
#   ~/umbrel/app-data/mathieu-decluttarr/docker-compose.yml
# then restart the app.

services:
  app_proxy:
    environment:
      APP_HOST: mathieu-decluttarr_web_1
      APP_PORT: 80

  web:
    image: nginx:alpine@sha256:54f2a904c251d5a34adf545a72d32515a15e08418dae0266e23be2e18c66fefa
    init: true
    restart: on-failure
    command:
      - sh
      - -c
      - |
        cat > /usr/share/nginx/html/index.html <<'HTML'
        <!doctype html><html lang="en"><head><meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Decluttarr</title>
        <style>body{font-family:system-ui,sans-serif;max-width:640px;margin:12vh auto;padding:0 24px;line-height:1.6;color:#1a1a1a}code{background:#f0f0f0;padding:2px 6px;border-radius:4px}h1{margin-bottom:.2em}</style>
        </head><body>
        <h1>🧹 Decluttarr</h1>
        <p>Decluttarr runs <strong>headless</strong> in the background &mdash; it has no web interface of its own. This page just confirms the app is installed.</p>
        <p>It watches your Radarr/Sonarr download queues and removes stalled, failed, orphaned and unwanted downloads. API keys are auto-detected from Sonarr/Radarr.</p>
        <h3>Go live</h3>
        <p>It starts in <strong>dry-run</strong> mode (nothing is deleted). To enable real cleanup, set <code>TEST_RUN</code> to <code>False</code> in:</p>
        <p><code>~/umbrel/app-data/mathieu-decluttarr/docker-compose.yml</code></p>
        <p>then restart the app. Watch progress with<br><code>docker logs -f mathieu-decluttarr_server_1</code></p>
        </body></html>
        HTML
        exec nginx -g 'daemon off;'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  server:
    image: ghcr.io/manimatter/decluttarr:v2.1.0@sha256:c06d48426b612b845f2406c2d045f266468a6390faf87aea796d497a2935ec95
    init: true
    restart: on-failure
    environment:
      TZ: Europe/London
      PUID: 1000
      PGID: 1000
      LOG_LEVEL: INFO
      # Dry-run: nothing is deleted until you set this to "False".
      TEST_RUN: "True"
      # How often (minutes) to scan the queues.
      TIMER: 10
      # Cleanup jobs. Only the two below operate purely on the *arr download
      # queue and are safe without a download client. They remove items the
      # *arr itself has already marked failed.
      REMOVE_FAILED_DOWNLOADS: "True"
      REMOVE_FAILED_IMPORTS: "True"
      # ⚠️ The jobs below need a SUPPORTED download client (qBittorrent or
      # SABnzbd — NOT Transmission). Without one, decluttarr can't tell what's
      # legitimately claimed and will flag your ENTIRE library as orphaned/
      # removable. Leave these "False" unless you run qBittorrent/SABnzbd.
      REMOVE_ORPHANS: "False"
      REMOVE_STALLED: "False"
      REMOVE_METADATA_MISSING: "False"
      REMOVE_BAD_FILES: "False"
      # ---- *arr connections ----
      # Hostnames point at Sonarr/Radarr from the official Umbrel App Store.
      # API keys are injected by exports.sh (auto-read from their config.xml).
      SONARR: >
        - base_url: "http://sonarr_server_1:8989"
          api_key: "${APP_DECLUTTARR_SONARR_API_KEY}"
      RADARR: >
        - base_url: "http://radarr_server_1:7878"
          api_key: "${APP_DECLUTTARR_RADARR_API_KEY}"
