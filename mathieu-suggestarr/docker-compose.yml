version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mathieu-suggestarr_server_1
      APP_PORT: 5000

  server:
    image: ciuse99/suggestarr:v2.10.0@sha256:357d777a731148255ce1aee2ee2192305eb43d8453db2a16bfce1872584cd092
    init: true
    environment:
      - TZ=Europe/Paris
      - SUGGESTARR_PORT=5000
      - LOG_LEVEL=info
    volumes:
      - ${APP_DATA_DIR}/data/config:/app/config/config_files
    restart: on-failure
