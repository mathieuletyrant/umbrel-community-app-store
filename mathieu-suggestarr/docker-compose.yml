version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mathieu-suggestarr_server_1
      APP_PORT: 5000

  server:
    image: ciuse99/suggestarr:v2.10.1@sha256:b5fd5ed1223655dd007363a65ef91f5b9b18a10f4aaf283be5bc9cca50f21712
    init: true
    environment:
      - TZ=Europe/Paris
      - SUGGESTARR_PORT=5000
      - LOG_LEVEL=info
    volumes:
      - ${APP_DATA_DIR}/data/config:/app/config/config_files
    restart: on-failure
