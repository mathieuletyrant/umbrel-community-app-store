# renovate: datasource=docker depName=ciuse99/suggestarr
version: "2.10.0"
port: 5000
description: >-
  SuggestArr automates "what to watch next": it reads your recent activity from
  Plex, Jellyfin or Emby, finds similar titles, and sends download requests to
  Jellyseerr / Overseerr automatically.


  It works in two modes. The default uses TMDb similarity (no AI, just a free
  TMDb key). The optional AI mode uses any OpenAI-compatible LLM — OpenAI,
  OpenRouter, Ollama, LiteLLM… — to generate hyper-personalized suggestions with
  a reason for each pick, plus a natural-language "AI Search" ("something like
  Blade Runner but funnier") that requests the match in one click.


  🛠️ SETUP INSTRUCTIONS


  Install Jellyseerr or Overseerr from the Umbrel App Store first — SuggestArr
  sends its requests through them. On first launch the web UI walks you through:
  connect your media server (Plex/Jellyfin/Emby), add a free TMDb API key,
  connect Jellyseerr/Overseerr, pick which users seed recommendations, and set
  the cron schedule. For AI mode, point it at your LLM endpoint (e.g. OpenRouter)
  and paste an API key.
