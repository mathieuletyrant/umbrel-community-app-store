# renovate: datasource=docker depName=ghcr.io/connorgallopo/tracearr extractVersion=^supervised-(?<version>.+)$
version: "1.5.0"
port: 3000
description: >-
  Tracearr is a self-hosted monitoring platform for Plex, Jellyfin, and Emby — an
  open-source alternative to Tautulli and Jellystat.


  From a single dashboard it tracks streams in real time across all your media
  servers, keeps a complete session history with geolocation (who watched what,
  when, where, and on which device), and detects account sharing with automated
  rules (e.g. the same account streaming from two distant cities at once).


  ⚙️ RESOURCES


  Tracearr runs its own bundled PostgreSQL (TimescaleDB) and Redis inside a single
  container. Budget at least ~3 GB of free RAM; low-memory devices may see the
  database get OOM-killed (exit code 137).


  🛠️ SETUP INSTRUCTIONS


  After launching, open Tracearr, create your admin account, then add each of your
  Plex / Jellyfin / Emby servers with their URL and API key/token.
