version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mathieu-slskd_server_1
      APP_PORT: 5030

  server:
    image: slskd/slskd:0.25.1@sha256:ab9ed50e028b524cefdb7c1dd8ebca368a076e18441ee8ac2326473eb850b4c3
    init: true
    user: "1000:1000"
    environment:
      - TZ=Europe/Paris
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_DOWNLOADS_DIR=/downloads/soulseek/complete
      - SLSKD_INCOMPLETE_DIR=/downloads/soulseek/incomplete
    ports:
      - "50300:50300/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/app:/app
      - ${UMBREL_ROOT}/home/Downloads:/downloads
    restart: on-failure
