version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mathieu-healarr_server_1
      APP_PORT: 3090

  server:
    image: ghcr.io/mescon/healarr:v1.3.17
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - TZ=Europe/London
      - HEALARR_PORT=3090
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${UMBREL_ROOT}/data/storage/downloads:/media:ro
    restart: on-failure
