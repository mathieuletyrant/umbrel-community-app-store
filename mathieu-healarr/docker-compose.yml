version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mathieu-healarr_server_1
      APP_PORT: 3090

  server:
    image: ghcr.io/mescon/healarr:1.3.17@sha256:c81ed017da40b4354febc1487423d95f2b7863c4501e7d199e96ce2190639e26
    init: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - HEALARR_PORT=3090
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      # Mounted at /downloads to match the paths Sonarr/Radarr report for files.
      # Host path is umbrelOS's shared home/Downloads folder used by the *arr apps.
      - ${UMBREL_ROOT}/home/Downloads:/downloads:ro
    restart: on-failure
