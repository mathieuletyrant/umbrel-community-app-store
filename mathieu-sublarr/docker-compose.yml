version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mathieu-sublarr_server_1
      APP_PORT: 5765

  server:
    image: ghcr.io/abrechen2/sublarr:1.9.1@sha256:ddc0ff173d419cd21057f901742e2bbc87486895732c11f15471ff514f170091
    init: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      # Allow the websocket/CORS from any origin — Umbrel apps are reached via
      # many hostnames (umbrel.local, LAN IP, Tailscale…) and sit behind
      # Umbrel's trusted auth proxy. Without this, the UI logs
      # "<origin> is not an accepted origin" and live updates break.
      - SUBLARR_CORS_ORIGINS=*
      # Media root — matches where the library is mounted below.
      - SUBLARR_MEDIA_PATH=/downloads
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      # Media mounted at the SAME path Sonarr/Radarr use (/downloads), so Sublarr
      # writes subtitle files next to the media without path mapping.
      - ${UMBREL_ROOT}/home/Downloads:/downloads
    restart: on-failure
