id: mathieu-soularr
category: media
name: Soularr
tagline: Auto-download Lidarr's wanted music from Soulseek via slskd
icon: https://raw.githubusercontent.com/mathieuletyrant/umbrel-community-app-store/master/mathieu-soularr/icon.png
# renovate: datasource=docker depName=mrusse08/soularr
version: "1.2.2"
port: 8265
description: >-
  Soularr bridges Lidarr and slskd to automate music downloads from the Soulseek
  network. On a schedule it reads the albums marked "wanted" in Lidarr, has slskd
  search Soulseek for them, downloads the best match, and imports the result back
  into Lidarr automatically — ideal for niche or rare tracks that never appear on
  trackers.


  It ships a web UI (log viewer, config editor and failed-imports dashboard) so
  you can watch and tune it without touching the host.


  ⚠️ REQUIRES the slskd app (also in this store) and Lidarr, both running.


  🛠️ SETUP INSTRUCTIONS


  A starter config is created on first run, already pointing at Lidarr
  (lidarr_server_1) and slskd (mathieu-slskd_server_1). You only need to fill in
  two API keys — open Soularr, go to the Config editor, and set:


  1. [Lidarr] api_key — from Lidarr → Settings → General.

  2. [Slskd] api_key — from slskd → Options → the API key under Web/Authentication.


  Save, and Soularr will start processing your Lidarr wanted list every 5 minutes
  (change SCRIPT_INTERVAL in the app's compose to adjust). Downloads flow through
  /downloads/soulseek/complete — the same path slskd and Lidarr use — so imports
  line up with no path mapping.
developer: mrusse
website: https://github.com/mrusse/soularr
submitter: Mathieu Le Tyrant
submission: https://github.com/mrusse/soularr
