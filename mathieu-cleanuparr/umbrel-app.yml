# renovate: datasource=docker depName=ghcr.io/cleanuparr/cleanuparr
version: "2.9.16"
port: 11011
description: >-
  Cleanuparr is an advanced download manager for the Servarr ecosystem
  (Sonarr, Radarr, Lidarr, Readarr, Whisparr).


  It keeps your download queue and disk clean: it removes stalled, failed and
  malicious/unwanted downloads, blocks them and triggers a fresh search in the
  *arr apps, and cleans up orphaned downloads — files with no hardlinks or no
  longer referenced by any *arr. It can scan your download directories for files
  not claimed by any active torrent and move them aside, so you stop
  accumulating duplicate and junk files.


  Works with Transmission, qBittorrent, Deluge and SABnzbd.


  🛠️ SETUP INSTRUCTIONS


  After launching, open Cleanuparr and connect it to your download client and
  your *arr apps (URL + API key) from the web interface, then enable the cleanup
  jobs you want.
