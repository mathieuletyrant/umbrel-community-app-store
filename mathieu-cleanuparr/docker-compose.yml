version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mathieu-cleanuparr_server_1
      APP_PORT: 11011

  server:
    image: ghcr.io/cleanuparr/cleanuparr:2.9.15@sha256:e579bc7593fb95e00aa16b2074a24f7148842857262663c9ab822d77e4d3d541
    init: true
    environment:
      - PORT=11011
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      # Downloads dir (same path the *arr apps use) so Cleanuparr can check
      # hardlinks for its orphaned / unlinked-download cleanup. Host path is
      # umbrelOS's shared home/Downloads folder used by this setup's *arr apps.
      - ${UMBREL_ROOT}/home/Downloads:/downloads
    restart: on-failure
