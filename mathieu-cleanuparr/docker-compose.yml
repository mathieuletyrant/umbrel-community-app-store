version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mathieu-cleanuparr_server_1
      APP_PORT: 11011

  server:
    image: ghcr.io/cleanuparr/cleanuparr:2.9.16@sha256:efd08729a33223a6a5bae267afcbeffe4bd2876b3f03144a025968adb8e3cc7e
    init: true
    environment:
      - PORT=11011
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      # Downloads dir (same path the *arr apps use) so Cleanuparr can check
      # hardlinks for its orphaned / unlinked-download cleanup. Host path is
      # umbrelOS's shared home/Downloads folder used by this setup's *arr apps.
      - ${UMBREL_ROOT}/home/Downloads:/downloads
    restart: on-failure
