version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mathieu-cleanuparr_server_1
      APP_PORT: 11011

  server:
    image: ghcr.io/cleanuparr/cleanuparr:2.9.14@sha256:a17be5104c2749cc8120e07dd63cb07fe8271f36fdb8f4a27ec46ddcf8581422
    init: true
    environment:
      - PORT=11011
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
    restart: on-failure
