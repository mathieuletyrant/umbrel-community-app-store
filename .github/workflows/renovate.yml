name: Renovate

# Scans the docker-compose.yml files for newer image tags/digests and opens
# bump PRs. The weekly cron is when the job wakes up; renovate.json's own
# `schedule` further gates when PRs are actually created.
on:
  schedule:
    - cron: "0 4 * * 1" # Monday 04:00 UTC
  workflow_dispatch: # allow running it by hand from the Actions tab

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Renovate
        uses: renovatebot/github-action@v41.0.9
        with:
          # A classic PAT (repo scope) or fine-grained token, NOT the default
          # GITHUB_TOKEN — PRs opened by GITHUB_TOKEN do not trigger the
          # claude-review workflow, and auto-merge needs a real token.
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          LOG_LEVEL: info
