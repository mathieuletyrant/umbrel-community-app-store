name: Validate apps

on:
  push:
    branches: [master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - run: pip install pyyaml

      - name: Validate app definitions
        run: python3 .github/scripts/validate_apps.py
