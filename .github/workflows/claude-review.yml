name: Claude review (Renovate PRs, via OpenRouter)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    if: startsWith(github.head_ref, 'renovate/') && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@1298632ce7736903d02a1435002705aa2a594a6c # v1
        env:
          # base is .../api NOT .../api/v1 — Claude Code appends /v1/messages.
          ANTHROPIC_BASE_URL: https://openrouter.ai/api
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "renovate[bot]"
          claude_args: >-
            --model ${{ vars.OPENROUTER_MODEL || 'anthropic/claude-haiku-4.5' }}
            --max-turns 30
            --allowedTools "Bash,Read,Edit,Write,Grep,Glob"
          prompt: |
            You are reviewing a Renovate PR that bumps a pinned Docker image in
            this Umbrel community app store. Read CLAUDE.md first (images are
            pinned as repo:TAG@sha256:DIGEST; each app folder has a
            docker-compose.yml and an umbrel-app.yml).

            ## Part 1 — Review
            1. Run `gh pr view ${{ github.event.pull_request.number }} --json body,title`
               and `gh pr diff ${{ github.event.pull_request.number }}`. Identify
               the app folder, image, old->new version, and update type
               (patch / minor / major / digest-only).
            2. Renovate embeds the upstream changelog in the PR body (the
               "Release Notes" section) — use THAT as your source of truth. Only
               from it, note any genuine breaking changes, new required env vars,
               changed default ports, or data-path/volume migrations that would
               need a matching edit to docker-compose.yml or umbrel-app.yml.
               Do NOT go hunting on GitHub and do NOT flag a tag/digest as
               suspicious — Renovate already resolved and validated them.

            ## Part 2 — Refresh releaseNotes (real version bumps only)
            Renovate already updated `version:` — do NOT touch it. For a version
            bump (skip for digest-only), rewrite `releaseNotes:` in the SAME
            app's umbrel-app.yml as a concise 1-3 sentence user-facing summary
            drawn from the PR body's Release Notes section. If the PR body has no
            changelog or releaseNotes already covers this version, make NO
            changes. Only ever touch that one releaseNotes field. Then:
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add <app-folder>/umbrel-app.yml
              git commit -m "Refresh releaseNotes for <app> <new-version>"
              git push

            ## Part 3 — Comment only on a real concern
            Do NOT comment on a clean/safe bump — leave the PR uncommented. Only
            if the changelog shows a genuine breaking change or a required config
            migration post ONE short comment:
            `gh pr comment ${{ github.event.pull_request.number }} --body "..."`
            starting with "⚠️ Review needed — <reason>" or "⛔ Do not merge — <reason>".
            Never comment merely about release/tag/digest existence.
